<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><title>測驗中</title>
    <script>
        let timeLeft = 300;
        function updateTimer() {
            let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
            document.getElementById('timer').innerHTML = `⏳ 剩餘時間：${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeLeft > 0) { timeLeft--; setTimeout(updateTimer, 1000); }
            else { document.forms[0].submit(); }
        }
        window.onload = updateTimer;
    </script>
</head>
<body style="font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; max-width: 600px; margin: 0 auto; padding: 20px;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <h1>📝 第5章：鏈結串列 實力測驗</h1>
        <div id="timer" style="color: #d32f2f; font-weight: bold; font-size: 20px;"></div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="diff" value="{{ request.GET.diff }}">
        <input type="hidden" name="num_questions" value="{{ num_questions }}">
        
        {% for question in questions %}
            <div style="background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <p style="font-weight: bold; font-size: 18px;">
                    {{ forloop.counter }}. {{ question.text }}
                    <span style="font-size: 12px; color: #7f8c8d; background: #eee; padding: 2px 6px; border-radius: 4px; margin-left: 10px;">
                        {{ question.get_difficulty_display }}
                    </span>
                </p>
                {% for choice in question.shuffled_choices %}
                    <label style="display: block; padding: 12px; border: 1px solid #ddd; margin: 8px 0; border-radius: 5px; cursor: pointer;">
                        <input type="radio" name="question_{{ question.id }}" value="{{ choice.id }}">
                        {{ choice.dynamic_letter }}. {{ choice.text }}
                    </label>
                {% endfor %}
            </div>
        {% endfor %}
        
        <button type="submit" style="width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer;">
            確認交卷
        </button>
    </form>
</body>
</html>
