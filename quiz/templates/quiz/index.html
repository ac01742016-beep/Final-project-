<form method="GET" action="/quiz/" style="display: flex; flex-direction: column; gap: 15px;">
    
    <div style="margin-bottom: 10px;">
        <label for="num_questions" style="font-weight: bold; color: #555;">選擇測驗題數：</label>
        <select name="num_questions" id="num_questions" style="padding: 10px; border-radius: 5px;">
            <option value="5">5 題</option>
            <option value="10">10 題</option>
        </select>
    </div>

    <input type="hidden" name="diff" id="diff_input" value="">
    
    <button type="submit" onclick="document.getElementById('diff_input').value=''" style="background-color: #607D8B; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">🎲 綜合測驗</button>
    <button type="submit" onclick="document.getElementById('diff_input').value='easy'" style="background-color: #4CAF50; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">🟢 簡單挑戰</button>
    <button type="submit" onclick="document.getElementById('diff_input').value='medium'" style="background-color: #FFC107; color: #333; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">🟡 中等挑戰</button>
    <button type="submit" onclick="document.getElementById('diff_input').value='hard'" style="background-color: #f44336; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">🔴 困難挑戰</button>
</form>
